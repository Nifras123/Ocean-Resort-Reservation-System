<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ocean View Resort - Reservation System</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div id="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-title">Ocean View Resort</div>
        <div class="brand-subtitle">Reservation System</div>
      </div>

      <nav class="nav">
        <button class="nav-item" id="goCustomerBtn">Customer</button>
        <button class="nav-item" id="goAdminBtn">Admin</button>
      </nav>

      <div class="sidebar-footer">
        <div class="small">Choose a role to continue</div>
        <div class="small">Default users: <b>admin</b>/<b>admin</b>, <b>Nippu</b>/<b>Nippu</b></div>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="topbar-left">
          <div class="page-title">Login</div>
          <div class="page-subtitle">Select Admin or Customer</div>
        </div>
        <div class="topbar-right">
          <div class="chip" id="authChip">Not logged in</div>
        </div>
      </header>

      <section class="content">
        <section class="panel">
          <h2>Welcome</h2>
          <div class="grid">
            <div class="card">
              <div class="card-title">Customer</div>
              <div class="card-body">Manage only your own reservations and bills.</div>
              <div class="form-actions" style="margin-top:12px;">
                <button class="primary" id="goCustomerBtn2">Go to Customer Dashboard</button>
              </div>
            </div>
            <div class="card">
              <div class="card-title">Admin</div>
              <div class="card-body">Full control: manage all reservations and customer data.</div>
              <div class="form-actions" style="margin-top:12px;">
                <button class="primary" id="goAdminBtn2">Go to Admin Dashboard</button>
              </div>
            </div>
          </div>
        </section>
      </section>
    </main>
  </div>

  <script>
    async function apiMe() {
      const token = localStorage.getItem("token");
      if (!token) return null;
      const res = await fetch("/api/me", { headers: { Authorization: `Bearer ${token}` } });
      if (!res.ok) return null;
      return await res.json();
    }

    async function autoRedirectIfLoggedIn() {
      try {
        const data = await apiMe();
        if (!data || !data.role) return;
        const chip = document.getElementById("authChip");
        if (chip && data.username) chip.textContent = `Logged in as ${data.username}`;
        if (data.role === "ADMIN") window.location.href = "/admin-dashboard.html";
        if (data.role === "CUSTOMER") window.location.href = "/customer-dashboard.html";
      } catch {
        localStorage.removeItem("token");
      }
    }

    function bindRoleButtons() {
      const goCustomer = () => (window.location.href = "/customer-dashboard.html");
      const goAdmin = () => (window.location.href = "/admin-dashboard.html");
      document.getElementById("goCustomerBtn").addEventListener("click", goCustomer);
      document.getElementById("goAdminBtn").addEventListener("click", goAdmin);
      document.getElementById("goCustomerBtn2").addEventListener("click", goCustomer);
      document.getElementById("goAdminBtn2").addEventListener("click", goAdmin);
    }

    bindRoleButtons();
    autoRedirectIfLoggedIn();
  </script>
 </body>
 </html>
